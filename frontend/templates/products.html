{% extends "base.html" %}

{% block content %}

<!-- ══════════════════════════════════════════════════════════
     PAGE HEADER
     ══════════════════════════════════════════════════════════ -->
<div class="page-header">
    <div class="container">
        <h1 id="page-title">All Products</h1>
        <div class="breadcrumb">
            <a href="/">Home</a>
            <span>›</span>
            <span id="breadcrumb-current">Products</span>
        </div>
    </div>
</div>


<div class="container" style="padding-bottom: var(--space-16)">
    <div class="products-layout">

        <!-- ══════════════════════════════════════════════════
             FILTERS SIDEBAR
             ══════════════════════════════════════════════════ -->
        <aside>

            <!-- Mobile Filter Toggle -->
            <button
                class="btn btn-outline btn-full show-mobile"
                style="margin-bottom:var(--space-4)"
                onclick="toggleMobileFilters()"
                id="filter-toggle-btn"
            >
                <i class="ph ph-funnel" id="filter-icon"></i>
                <span id="filter-toggle-text"> Filters</span>
                <span id="active-filter-count" style="display:none" class="badge badge-primary">0</span>
            </button>

            <div class="filters-sidebar" id="filters-sidebar" style="display:none">

                <!-- Header -->
                <h3>
                    Filters
                    <button
                        class="btn btn-ghost btn-sm"
                        onclick="clearAllFilters()"
                        style="font-size:var(--text-xs)"
                    >
                        Clear All
                    </button>
                </h3>

                <!-- Price Range -->
                <div class="filter-group">
                    <h4>Price Range</h4>
                    <div class="price-range">
                        <input
                            type="number"
                            id="price-min"
                            placeholder="Min"
                            min="0"
                            oninput="debouncedApplyFilters()"
                        >
                        <span style="color:var(--color-text-muted)">–</span>
                        <input
                            type="number"
                            id="price-max"
                            placeholder="Max"
                            min="0"
                            oninput="debouncedApplyFilters()"
                        >
                    </div>
                </div>

                <hr class="divider">

                <!-- Availability -->
                <div class="filter-group">
                    <h4>Availability</h4>
                    <label class="filter-option">
                        <input type="checkbox" id="filter-in-stock" onchange="applyFilters()">
                        In Stock Only
                    </label>
                    <label class="filter-option">
                        <input type="checkbox" id="filter-on-sale" onchange="applyFilters()">
                        On Sale
                    </label>
                    <label class="filter-option">
                        <input type="checkbox" id="filter-featured" onchange="applyFilters()">
                        Featured
                    </label>
                </div>

                <!-- Close button (mobile) — filters apply live, no Apply needed -->
                <button
                    class="btn btn-outline btn-full show-mobile"
                    style="margin-top:var(--space-4)"
                    onclick="toggleMobileFilters()"
                >
                    <i class="ph ph-x"></i> Close Filters
                </button>

            </div>
        </aside>


        <!-- ══════════════════════════════════════════════════
             PRODUCTS MAIN
             ══════════════════════════════════════════════════ -->
        <div>

            <!-- Toolbar -->
            <div class="products-toolbar">
                <div class="products-count">
                    Showing <strong id="products-showing">0</strong> of
                    <strong id="products-total">0</strong> products
                </div>
                <select class="sort-select" id="sort-select" onchange="applyFilters()">
                    <option value="newest">Newest First</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                    <option value="name_asc">Name: A to Z</option>
                </select>
            </div>

            <!-- Active Filters Tags -->
            <div id="active-filters" style="display:flex; gap:var(--space-2); flex-wrap:wrap; margin-bottom:var(--space-4)">
                <!-- Active filter tags shown here -->
            </div>

            <!-- Products Grid -->
            <div class="products-grid" id="products-grid">
                <!-- Skeleton -->
                ${Array(8).fill(`
                    <div class="product-card">
                        <div class="product-card-image skeleton"></div>
                        <div class="product-card-body">
                            <div class="skeleton skeleton-text" style="width:50%"></div>
                            <div class="skeleton skeleton-text"></div>
                            <div class="skeleton skeleton-text" style="width:70%"></div>
                        </div>
                    </div>
                `).join('')}
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="empty-state" style="display:none">
                <div class="empty-state-icon">🔍</div>
                <h3>No products found</h3>
                <p>Try adjusting your filters or search term</p>
                <button class="btn btn-outline" onclick="clearAllFilters()">Clear Filters</button>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display:none">
                <!-- Populated by JS -->
            </div>

        </div>
    </div>
</div>

{% endblock %}


{% block extra_js %}
<script>
/* ══════════════════════════════════════════════════════════
   PRODUCTS PAGE JS
   ══════════════════════════════════════════════════════════ */

// ── State ──────────────────────────────────────────────────
const state = {
    page      : 1,
    per_page  : 12,
    q         : '',
    category  : '',
    sort      : 'newest',
    min_price : '',
    max_price : '',
    in_stock  : false,
    on_sale   : false,
    featured  : false,
};


// ── Init from URL params ───────────────────────────────────
function initFromURL() {
    const params = new URLSearchParams(window.location.search);

    if (params.get('q'))         { state.q         = params.get('q'); }
    if (params.get('category'))  { state.category  = params.get('category'); }
    if (params.get('page'))      { state.page       = parseInt(params.get('page')); }
    if (params.get('sort'))      { state.sort       = params.get('sort'); document.getElementById('sort-select').value = state.sort; }
    if (params.get('featured'))  { state.featured   = true; document.getElementById('filter-featured').checked = true; }
    if (params.get('sale'))      { state.on_sale    = true; document.getElementById('filter-on-sale').checked  = true; }
    if (params.get('in_stock'))  { state.in_stock   = true; document.getElementById('filter-in-stock').checked = true; }
    if (params.get('min_price')) { state.min_price  = params.get('min_price'); document.getElementById('price-min').value = state.min_price; }
    if (params.get('max_price')) { state.max_price  = params.get('max_price'); document.getElementById('price-max').value = state.max_price; }

    // Prevent flash: immediately remove "All Products" active class when a category
    // is in the URL. loadNavCategories() (async) will complete the full sync later.
    if (state.category) {
        const allLink = document.querySelector('#category-nav a[data-cat-slug=""]');
        if (allLink) allLink.classList.remove('active');
    }

    if (state.q) {
        document.getElementById('page-title').textContent         = `Search: "${state.q}"`;
        document.getElementById('breadcrumb-current').textContent = 'Search Results';
    }

    // Show active filter tags immediately so UI isn't blank while products load
    updateActiveFilterTags();
}


// ── Fetch & Render Products ────────────────────────────────
async function loadProducts() {
    const grid       = document.getElementById('products-grid');
    const emptyState = document.getElementById('empty-state');
    const pagination = document.getElementById('pagination');

    // Show skeletons
    grid.innerHTML = Array(state.per_page).fill(`
        <div class="product-card">
            <div class="product-card-image skeleton"></div>
            <div class="product-card-body">
                <div class="skeleton skeleton-text" style="width:50%"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text" style="width:40%"></div>
            </div>
        </div>
    `).join('');
    emptyState.style.display = 'none';
    pagination.style.display = 'none';

    // Build query
    const params = new URLSearchParams({ page: state.page, per_page: state.per_page });
    if (state.q)         params.set('q',         state.q);
    if (state.category)  params.set('category',  state.category);
    if (state.sort)      params.set('sort',       state.sort);
    if (state.min_price) params.set('min_price',  state.min_price);
    if (state.max_price) params.set('max_price',  state.max_price);
    if (state.in_stock)  params.set('in_stock',   'true');
    if (state.on_sale)   params.set('sale',        'true');
    if (state.featured)  params.set('featured',    'true');

    const endpoint = state.q
        ? `/api/products/search?${params}`
        : `/api/products/?${params}`;

    try {
        const res      = await API.get(endpoint);
        const products = res.data?.products || [];
        const pag      = res.data?.pagination || {};

        document.getElementById('products-showing').textContent = products.length;
        document.getElementById('products-total').textContent   = pag.total || products.length;

        grid.innerHTML = '';

        if (products.length === 0) {
            emptyState.style.display = 'flex';
            return;
        }

        products.forEach(product => { grid.innerHTML += renderProductCard(product); });

        if (pag.total_pages > 1) {
            renderPagination(pag);
            pagination.style.display = 'flex';
        }

        updateURL();

    } catch (e) {
        grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
                <div class="empty-state-icon">⚠️</div>
                <h3>Something went wrong</h3>
                <p>Unable to load products. Please refresh.</p>
            </div>
        `;
    }
}


// ── Render Product Card ────────────────────────────────────
function renderProductCard(product) {
    const variant      = product.variants?.[0];
    const price        = variant ? parseFloat(variant.price) : parseFloat(product.base_price);
    const effPrice    = (variant?.sale_price !== null && variant?.sale_price !== undefined)
        ? parseFloat(variant.sale_price) : price;
    const oldPrice    = variant?.old_price ? parseFloat(variant.old_price) : null;
    const showStrike  = !!(oldPrice && oldPrice !== effPrice);
    const discountPct = showStrike ? Math.round((oldPrice - effPrice) / oldPrice * 100) : 0;
    const image       = product.images?.[0]?.image_url || '/static/images/placeholder.png';
    const inStock     = variant ? variant.stock_qty > 0 : false;

    return `
        <div class="product-card">
            <a href="/product/${product.slug}" class="product-card-image">
                <img src="${image}" alt="${product.name}" loading="lazy"
                     onerror="this.src='/static/images/placeholder.png'">
                <div class="product-card-badges">
                    ${showStrike && discountPct > 0 ? `<span class="badge-sale">-${discountPct}%</span>` : ''}
                    ${product.is_featured ? `<span class="badge-featured">Featured</span>` : ''}
                    ${!inStock ? `<span class="badge-sale" style="background:var(--color-text-muted)">Out of Stock</span>` : ''}
                </div>
                <div class="product-card-quick-add">
                    <button
                        class="btn btn-accent btn-full btn-sm"
                        onclick="quickAdd(event, ${variant?.id || 'null'}, '${product.name}', '${product.slug}')"
                        ${!inStock ? 'disabled' : ''}
                    >
                        <i class="ph ph-shopping-cart"></i>
                        ${inStock ? 'Quick Add' : 'Out of Stock'}
                    </button>
                </div>
            </a>
            <div class="product-card-body">
                <div class="product-card-category">${product.category?.name || ''}</div>
                <div class="product-card-name">${product.name}</div>
                ${product.name_ta ? `<div style="font-size:var(--text-xs); color:var(--color-text-muted)">${product.name_ta}</div>` : ''}
                ${product.source_info ? `<div class="product-card-source">🧑‍🌾 ${product.source_info}</div>` : ''}
                <div class="product-card-footer">
                    <div class="product-card-price">
                        <span class="price ${showStrike ? 'price-sale' : ''}">
                            ₹${effPrice.toFixed(2)}
                        </span>
                        ${showStrike ? `<span class="price-original">₹${oldPrice.toFixed(2)}</span>` : ''}
                    </div>
                    <button
                        class="btn btn-primary btn-sm"
                        onclick="quickAdd(event, ${variant?.id || 'null'}, '${product.name}', '${product.slug}')"
                        ${!inStock ? 'disabled' : ''}
                    >
                        ${inStock ? '<i class="ph ph-plus"></i>' : '—'}
                    </button>
                </div>
            </div>
        </div>
    `;
}


// ── Quick Add ──────────────────────────────────────────────
async function quickAdd(event, variantId, productName, slug) {
    event.preventDefault();
    event.stopPropagation();

    if (!variantId) {
        window.location.href = `/product/${slug}`;
        return;
    }

    const btn = event.currentTarget;
    btn.disabled = true;
    btn.innerHTML = '<i class="ph ph-circle-notch"></i>';

    try {
        await Cart.addItem(variantId, 1);
        btn.innerHTML = '<i class="ph ph-check"></i>';
        showToast(`${productName} added to cart! 🛒`);
        setTimeout(() => {
            btn.disabled  = false;
            btn.innerHTML = '<i class="ph ph-plus"></i>';
        }, 1500);
    } catch (err) {
        btn.disabled  = false;
        btn.innerHTML = '<i class="ph ph-plus"></i>';
        showToast(err.message || 'Failed to add to cart', 'error');
    }
}


// ── Pagination ─────────────────────────────────────────────
function renderPagination(pag) {
    const container = document.getElementById('pagination');
    container.innerHTML = '';

    const prev = document.createElement('button');
    prev.className = 'pagination-btn';
    prev.innerHTML = '<i class="ph ph-caret-left"></i>';
    prev.disabled  = !pag.has_prev;
    prev.onclick   = () => { state.page--; loadProducts(); scrollToTop(); };
    container.appendChild(prev);

    for (let i = 1; i <= pag.total_pages; i++) {
        if (i === 1 || i === pag.total_pages || (i >= pag.page - 1 && i <= pag.page + 1)) {
            const btn = document.createElement('button');
            btn.className   = `pagination-btn ${i === pag.page ? 'active' : ''}`;
            btn.textContent = i;
            btn.onclick     = () => { state.page = i; loadProducts(); scrollToTop(); };
            container.appendChild(btn);
        } else if (i === pag.page - 2 || i === pag.page + 2) {
            const dots = document.createElement('span');
            dots.textContent   = '...';
            dots.style.padding = '0 var(--space-2)';
            dots.style.color   = 'var(--color-text-muted)';
            container.appendChild(dots);
        }
    }

    const next = document.createElement('button');
    next.className = 'pagination-btn';
    next.innerHTML = '<i class="ph ph-caret-right"></i>';
    next.disabled  = !pag.has_next;
    next.onclick   = () => { state.page++; loadProducts(); scrollToTop(); };
    container.appendChild(next);
}


// ── Category Selection (called by header nav or filter tag clear) ──
function selectCategory(slug) {
    state.category = slug;
    state.page     = 1;

    // Sync header nav active state
    document.querySelectorAll('#category-nav a[data-cat-slug]').forEach(a => {
        a.classList.toggle('active', a.dataset.catSlug === slug);
    });

    // Update page title from the now-active nav link
    const activeLink = document.querySelector(`#category-nav a[data-cat-slug="${slug}"]`);
    const label      = activeLink?.textContent?.trim() || 'All Products';
    document.getElementById('page-title').textContent         = label;
    document.getElementById('breadcrumb-current').textContent = slug ? label : 'Products';

    applyFilters();
}


// ── Debounced Apply (for price inputs — avoids API call on every keystroke) ──
let _priceTimer = null;
function debouncedApplyFilters() {
    clearTimeout(_priceTimer);
    _priceTimer = setTimeout(applyFilters, 400);
}


// ── Apply Filters ──────────────────────────────────────────
function applyFilters() {
    state.page      = 1;
    state.sort      = document.getElementById('sort-select').value;
    state.min_price = document.getElementById('price-min').value;
    state.max_price = document.getElementById('price-max').value;
    state.in_stock  = document.getElementById('filter-in-stock').checked;
    state.on_sale   = document.getElementById('filter-on-sale').checked;
    state.featured  = document.getElementById('filter-featured').checked;

    updateActiveFilterTags();
    loadProducts();
}


// ── Clear All Filters ──────────────────────────────────────
function clearAllFilters() {
    state.q         = '';
    state.category  = '';
    state.page      = 1;
    state.sort      = 'newest';
    state.min_price = '';
    state.max_price = '';
    state.in_stock  = false;
    state.on_sale   = false;
    state.featured  = false;

    document.getElementById('sort-select').value        = 'newest';
    document.getElementById('price-min').value          = '';
    document.getElementById('price-max').value          = '';
    document.getElementById('filter-in-stock').checked  = false;
    document.getElementById('filter-on-sale').checked   = false;
    document.getElementById('filter-featured').checked  = false;

    // Reset header nav — activate "All Products"
    document.querySelectorAll('#category-nav a[data-cat-slug]').forEach(a => {
        a.classList.toggle('active', a.dataset.catSlug === '');
    });

    document.getElementById('page-title').textContent         = 'All Products';
    document.getElementById('breadcrumb-current').textContent = 'Products';

    updateActiveFilterTags();
    loadProducts();
}


// ── Active Filter Tags ─────────────────────────────────────
function updateActiveFilterTags() {
    const container = document.getElementById('active-filters');
    const tags      = [];

    if (state.q)        tags.push({ label: `Search: "${state.q}"`,       clear: () => { state.q = ''; applyFilters(); } });
    if (state.category) tags.push({ label: `Category: ${state.category}`, clear: () => selectCategory('') });
    if (state.on_sale)  tags.push({ label: 'On Sale',  clear: () => { state.on_sale  = false; document.getElementById('filter-on-sale').checked  = false; applyFilters(); } });
    if (state.featured) tags.push({ label: 'Featured', clear: () => { state.featured = false; document.getElementById('filter-featured').checked = false; applyFilters(); } });
    if (state.in_stock) tags.push({ label: 'In Stock', clear: () => { state.in_stock = false; document.getElementById('filter-in-stock').checked = false; applyFilters(); } });
    if (state.min_price || state.max_price) tags.push({
        label : `₹${state.min_price || 0} – ₹${state.max_price || '∞'}`,
        clear : () => { state.min_price = ''; state.max_price = ''; document.getElementById('price-min').value = ''; document.getElementById('price-max').value = ''; applyFilters(); }
    });

    container.innerHTML = tags.map((t, i) => `
        <span class="badge badge-primary"
              style="cursor:pointer; padding:var(--space-2) var(--space-3)"
              onclick="activeFilterClear(${i})">
            ${t.label} ✕
        </span>
    `).join('');

    window._filterClears = tags.map(t => t.clear);

    const countBadge = document.getElementById('active-filter-count');
    if (tags.length > 0) {
        countBadge.textContent   = tags.length;
        countBadge.style.display = 'inline-flex';
    } else {
        countBadge.style.display = 'none';
    }
}

function activeFilterClear(index) {
    window._filterClears?.[index]?.();
}


// ── Mobile Filters ─────────────────────────────────────────
function toggleMobileFilters() {
    const sidebar = document.getElementById('filters-sidebar');
    const isOpen  = sidebar.style.display !== 'none';
    sidebar.style.display = isOpen ? 'none' : 'block';
    document.getElementById('filter-icon').className         = isOpen ? 'ph ph-funnel' : 'ph ph-x';
    document.getElementById('filter-toggle-text').textContent = isOpen ? ' Filters' : ' Close Filters';
}


// ── URL Sync ───────────────────────────────────────────────
function updateURL() {
    const params = new URLSearchParams();
    if (state.q)                 params.set('q',         state.q);
    if (state.category)          params.set('category',  state.category);
    if (state.page > 1)          params.set('page',      state.page);
    if (state.sort !== 'newest') params.set('sort',      state.sort);
    if (state.featured)          params.set('featured',  'true');
    if (state.on_sale)           params.set('sale',       'true');
    if (state.in_stock)          params.set('in_stock',   'true');
    if (state.min_price)         params.set('min_price',  state.min_price);
    if (state.max_price)         params.set('max_price',  state.max_price);
    const qs = params.toString();
    window.history.replaceState({}, '', `${window.location.pathname}${qs ? '?' + qs : ''}`);
}


// ── Show Filters on Desktop ────────────────────────────────
function handleResponsiveFilters() {
    const sidebar = document.getElementById('filters-sidebar');
    sidebar.style.display = window.innerWidth >= 1024 ? 'block' : 'none';
}

window.addEventListener('resize', handleResponsiveFilters);


// ── Init ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    handleResponsiveFilters();
    initFromURL();
    loadProducts();
});
</script>
{% endblock %}
