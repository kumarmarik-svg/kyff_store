{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">

        <div class="auth-card-header">
            <div style="font-size:2.5rem; margin-bottom:var(--space-3)">🌾</div>
            <h1>Welcome Back</h1>
            <p>Login to your KYFF account</p>
        </div>

        <!-- Error Banner -->
        <div id="login-error" style="display:none; background:#FEE2E2; color:#991B1B;
             padding:var(--space-3) var(--space-4); border-radius:var(--radius-md);
             font-size:var(--text-sm); margin-bottom:var(--space-5)">
        </div>

        <!-- Form -->
        <div>
            <div class="form-group">
                <label class="form-label">Email <span class="required">*</span></label>
                <input type="email" class="form-input" id="login-email"
                       placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label"
                       style="display:flex; justify-content:space-between; align-items:center">
                    <span>Password <span class="required">*</span></span>
                    <a href="/auth/forgot-password"
                       style="font-weight:var(--weight-regular);
                              color:var(--color-primary); font-size:var(--text-xs)">
                        Forgot password?
                    </a>
                </label>
                <div style="position:relative">
                    <input type="password" class="form-input" id="login-password"
                           placeholder="Enter your password"
                           autocomplete="current-password"
                           onkeydown="if(event.key==='Enter') submitLogin()">
                    <button onclick="togglePassword('login-password')"
                            style="position:absolute; right:var(--space-3); top:50%;
                                   transform:translateY(-50%); color:var(--color-text-muted)">
                        <i class="ph ph-eye" id="login-pass-eye"></i>
                    </button>
                </div>
            </div>

            <div style="display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-4)">
                <input type="checkbox" id="remember-me"
                       style="width:16px; height:16px; accent-color:var(--color-primary); cursor:pointer; flex-shrink:0">
                <label for="remember-me"
                       style="font-size:var(--text-sm); color:var(--color-text); cursor:pointer; margin:0">
                    Remember me
                </label>
            </div>

            <button class="btn btn-primary btn-full btn-lg"
                    onclick="submitLogin()" id="login-btn">
                <i class="ph ph-sign-in"></i> Login
            </button>
        </div>

        <div class="auth-divider">or</div>

        <!-- Guest Checkout -->
        <a href="/products" class="btn btn-outline btn-full">
            <i class="ph ph-storefront"></i> Continue Browsing as Guest
        </a>

        <div class="auth-footer">
            Don't have an account?
            <a href="/auth/register">Create one — it's free</a>
        </div>

    </div>
</div>
{% endblock %}


{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
        window.location.href = getNextUrl();
        return;
    }

    // Pre-fill remembered email (password is never stored)
    if (localStorage.getItem('kyff_remember_me') === 'true') {
        const savedEmail = localStorage.getItem('kyff_remembered_email') || '';
        document.getElementById('login-email').value   = savedEmail;
        document.getElementById('remember-me').checked = true;
    }

    document.getElementById('login-email').focus();
});

function getNextUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('next') || '/';
}

function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    const eye   = document.getElementById(`${inputId.replace('login-', 'login-')}-eye`);
    if (input.type === 'password') {
        input.type    = 'text';
        if(eye) eye.className = 'ph ph-eye-slash';
    } else {
        input.type    = 'password';
        if(eye) eye.className = 'ph ph-eye';
    }
}

async function submitLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl  = document.getElementById('login-error');
    const btn      = document.getElementById('login-btn');

    // Clear error
    errorEl.style.display = 'none';

    // Validate
    if (!email || !password) {
        errorEl.textContent    = 'Please enter your email and password.';
        errorEl.style.display  = 'block';
        return;
    }

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.textContent   = 'Please enter a valid email address.';
        errorEl.style.display = 'block';
        return;
    }

    btn.disabled  = true;
    btn.classList.add('loading');

    // Handle Remember Me before login attempt
    if (document.getElementById('remember-me').checked) {
        localStorage.setItem('kyff_remember_me',      'true');
        localStorage.setItem('kyff_remembered_email',  email);
    } else {
        localStorage.removeItem('kyff_remember_me');
        localStorage.removeItem('kyff_remembered_email');
    }
    // Clean up any password that may have been stored by an older version
    localStorage.removeItem('kyff_remembered_password');

    try {
        await Auth.login(email, password);
        showToast('Welcome back! 👋');
        setTimeout(() => window.location.href = getNextUrl(), 800);
    } catch (err) {
        errorEl.textContent   = err.message || 'Invalid email or password.';
        errorEl.style.display = 'block';
        btn.disabled  = false;
        btn.classList.remove('loading');
        document.getElementById('login-password').value = '';
        document.getElementById('login-password').focus();
    }
}
</script>
{% endblock %}
