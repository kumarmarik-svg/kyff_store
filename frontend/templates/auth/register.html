{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">

        <div class="auth-card-header">
            <div style="font-size:2.5rem; margin-bottom:var(--space-3)">🌱</div>
            <h1>Create Account</h1>
            <p>Join KYFF and support local farmers</p>
        </div>

        <!-- Error Banner -->
        <div id="reg-error" style="display:none; background:#FEE2E2; color:#991B1B;
             padding:var(--space-3) var(--space-4); border-radius:var(--radius-md);
             font-size:var(--text-sm); margin-bottom:var(--space-5)">
        </div>

        <!-- Form -->
        <div>
            <div class="form-group">
                <label class="form-label">Full Name <span class="required">*</span></label>
                <input type="text" class="form-input" id="reg-name"
                       placeholder="Your full name" autocomplete="name">
            </div>

            <div class="form-group">
                <label class="form-label">Email <span class="required">*</span></label>
                <input type="email" class="form-input" id="reg-email"
                       placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-input" id="reg-phone"
                       placeholder="+91 99999 99999" autocomplete="tel">
            </div>

            <div class="form-group">
                <label class="form-label">Password <span class="required">*</span></label>
                <div style="position:relative">
                    <input type="password" class="form-input" id="reg-password"
                           placeholder="Minimum 8 characters"
                           autocomplete="new-password"
                           oninput="checkPasswordStrength(this.value)">
                    <button onclick="toggleRegPassword()"
                            style="position:absolute; right:var(--space-3); top:50%;
                                   transform:translateY(-50%); color:var(--color-text-muted)">
                        <i class="ph ph-eye" id="reg-pass-eye"></i>
                    </button>
                </div>

                <!-- Password Strength -->
                <div style="margin-top:var(--space-2)">
                    <div style="height:4px; background:var(--color-border);
                                border-radius:var(--radius-full); overflow:hidden">
                        <div id="strength-bar"
                             style="height:100%; width:0%; transition:all 0.3s;
                                    border-radius:var(--radius-full)"></div>
                    </div>
                    <div id="strength-text"
                         style="font-size:var(--text-xs); color:var(--color-text-muted);
                                margin-top:4px"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    Confirm Password <span class="required">*</span>
                </label>
                <input type="password" class="form-input" id="reg-confirm"
                       placeholder="Re-enter your password"
                       autocomplete="new-password"
                       onkeydown="if(event.key==='Enter') submitRegister()">
            </div>

            <label class="filter-option"
                style="font-size:var(--text-sm); margin-bottom:var(--space-5);
                        align-items:flex-start; gap:var(--space-2)">
                <input type="checkbox" id="reg-terms"
                    style="margin-top:2px; flex-shrink:0">
                <span>
                    I agree to the <a href="#">Terms of Service</a>
                    and <a href="#">Privacy Policy</a>
                </span>
            </label>

            <button class="btn btn-primary btn-full btn-lg"
                    onclick="submitRegister()" id="reg-btn">
                <i class="ph ph-user-plus"></i> Create Account
            </button>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="/auth/login">Login</a>
        </div>

    </div>
</div>
{% endblock %}


{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    if (Auth.isLoggedIn()) {
        window.location.href = '/';
        return;
    }
    document.getElementById('reg-name').focus();
});

function toggleRegPassword() {
    const input = document.getElementById('reg-password');
    const eye   = document.getElementById('reg-pass-eye');
    if (input.type === 'password') {
        input.type    = 'text';
        eye.className = 'ph ph-eye-slash';
    } else {
        input.type    = 'password';
        eye.className = 'ph ph-eye';
    }
}

function checkPasswordStrength(password) {
    const bar  = document.getElementById('strength-bar');
    const text = document.getElementById('strength-text');

    let score = 0;
    if (password.length >= 8)                    score++;
    if (/[A-Z]/.test(password))                  score++;
    if (/[0-9]/.test(password))                  score++;
    if (/[^A-Za-z0-9]/.test(password))           score++;

    const levels = [
        { width: '0%',   color: '',                          label: ''          },
        { width: '25%',  color: 'var(--color-error)',        label: 'Weak'      },
        { width: '50%',  color: 'var(--color-warning)',      label: 'Fair'      },
        { width: '75%',  color: 'var(--color-accent)',       label: 'Good'      },
        { width: '100%', color: 'var(--color-success)',      label: 'Strong 💪' },
    ];

    const level      = levels[score] || levels[0];
    bar.style.width  = level.width;
    bar.style.background = level.color;
    text.textContent = level.label;
    text.style.color = level.color;
}

async function submitRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const phone    = document.getElementById('reg-phone').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;
    const terms    = document.getElementById('reg-terms').checked;
    const errorEl  = document.getElementById('reg-error');
    const btn      = document.getElementById('reg-btn');

    errorEl.style.display = 'none';

    // Validate
    if (!name || !email || !password || !confirm) {
        errorEl.textContent   = 'Please fill in all required fields.';
        errorEl.style.display = 'block';
        return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.textContent   = 'Please enter a valid email address.';
        errorEl.style.display = 'block';
        return;
    }
    if (password.length < 8) {
        errorEl.textContent   = 'Password must be at least 8 characters.';
        errorEl.style.display = 'block';
        return;
    }
    if (password !== confirm) {
        errorEl.textContent   = 'Passwords do not match.';
        errorEl.style.display = 'block';
        document.getElementById('reg-confirm').value = '';
        return;
    }
    if (!terms) {
        errorEl.textContent   = 'Please accept the Terms of Service.';
        errorEl.style.display = 'block';
        return;
    }

    btn.disabled  = true;
    btn.classList.add('loading');

    try {
        await Auth.register({ name, email, phone: phone || null, password });
        showToast('Account created! Welcome to KYFF 🌾');
        setTimeout(() => window.location.href = '/', 1000);
    } catch (err) {
        errorEl.textContent   = err.message || 'Registration failed. Please try again.';
        errorEl.style.display = 'block';
        btn.disabled  = false;
        btn.classList.remove('loading');
    }
}
</script>
{% endblock %}
