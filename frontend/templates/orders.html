{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <div class="container">
        <h1>My Orders</h1>
        <div class="breadcrumb">
            <a href="/">Home</a>
            <span>›</span>
            <span>My Orders</span>
        </div>
    </div>
</div>

<div class="container" style="padding-bottom:var(--space-16)">

    <!-- Loading -->
    <div id="orders-loading" class="loading-overlay">
        <div class="spinner spinner-lg"></div>
    </div>

    <!-- Empty -->
    <div id="orders-empty" style="display:none">
        <div class="empty-state">
            <div class="empty-state-icon">📦</div>
            <h3>No orders yet</h3>
            <p>Your orders will appear here once you place one!</p>
            <a href="/products" class="btn btn-primary btn-lg">
                <i class="ph ph-storefront"></i> Start Shopping
            </a>
        </div>
    </div>

    <!-- Orders List -->
    <div id="orders-content" style="display:none">

        <!-- Filter Tabs -->
        <div style="display:flex; gap:var(--space-2); overflow-x:auto;
                    padding-bottom:var(--space-2); margin-bottom:var(--space-6);
                    scrollbar-width:none">
            <button class="tab-btn active" onclick="filterOrders('all')"    id="tab-all">All</button>
            <button class="tab-btn"        onclick="filterOrders('pending')"    id="tab-pending">Pending</button>
            <button class="tab-btn"        onclick="filterOrders('confirmed')"  id="tab-confirmed">Confirmed</button>
            <button class="tab-btn"        onclick="filterOrders('processing')" id="tab-processing">Processing</button>
            <button class="tab-btn"        onclick="filterOrders('shipped')"    id="tab-shipped">Shipped</button>
            <button class="tab-btn"        onclick="filterOrders('delivered')"  id="tab-delivered">Delivered</button>
            <button class="tab-btn"        onclick="filterOrders('cancelled')"  id="tab-cancelled">Cancelled</button>
        </div>

        <!-- Count -->
        <p style="font-size:var(--text-sm); color:var(--color-text-muted);
                  margin-bottom:var(--space-5)">
            Showing <strong id="orders-count">0</strong> orders
        </p>

        <!-- Orders -->
        <div id="orders-list"></div>

        <!-- Pagination -->
        <div class="pagination" id="orders-pagination" style="display:none"></div>

    </div>
</div>

{% endblock %}


{% block extra_js %}
<script>
/* ══════════════════════════════════════════════════════════
   ORDERS PAGE JS
   ══════════════════════════════════════════════════════════ */

let allOrders    = [];
let activeFilter = 'all';
let currentPage  = 1;
const PER_PAGE   = 10;


// ── Init ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    if (!Auth.isLoggedIn()) {
        window.location.href = '/auth/login?next=/orders';
        return;
    }
    loadOrders();
});


// ── Load Orders ────────────────────────────────────────────
async function loadOrders() {
    try {
        const res   = await API.get('/api/orders/');
        allOrders   = res.data?.orders || [];

        document.getElementById('orders-loading').style.display = 'none';

        if (allOrders.length === 0) {
            document.getElementById('orders-empty').style.display   = 'flex';
            return;
        }

        document.getElementById('orders-content').style.display = 'block';
        renderOrders();

    } catch (e) {
        document.getElementById('orders-loading').style.display = 'none';
        document.getElementById('orders-empty').style.display   = 'flex';
    }
}


// ── Filter Orders ──────────────────────────────────────────
function filterOrders(status) {
    activeFilter = status;
    currentPage  = 1;

    document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${status}`).classList.add('active');

    renderOrders();
}


// ── Render Orders ──────────────────────────────────────────
function renderOrders() {
    const filtered = activeFilter === 'all'
        ? allOrders
        : allOrders.filter(o => o.status === activeFilter);

    document.getElementById('orders-count').textContent = filtered.length;

    const container = document.getElementById('orders-list');

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">🔍</div>
                <h3>No ${activeFilter} orders</h3>
                <p>You don't have any ${activeFilter} orders.</p>
            </div>
        `;
        document.getElementById('orders-pagination').style.display = 'none';
        return;
    }

    // Paginate
    const start       = (currentPage - 1) * PER_PAGE;
    const paged       = filtered.slice(start, start + PER_PAGE);
    const total_pages = Math.ceil(filtered.length / PER_PAGE);

    container.innerHTML = paged.map(order => renderOrderCard(order)).join('');

    if (total_pages > 1) {
        renderPagination(total_pages);
        document.getElementById('orders-pagination').style.display = 'flex';
    } else {
        document.getElementById('orders-pagination').style.display = 'none';
    }

    // Kick off live countdown timers for any pending-payment cards
    startCountdownTimers();
}


// ── Render Order Card ──────────────────────────────────────
function renderOrderCard(order) {
    const items  = order.items || [];
    const thumbs = items.slice(0, 3);
    const extra  = items.length - 3;
    const isPending  = order.status === 'pending';
    const isExpired  = order.is_payment_expired;

    // Pending expiry countdown text
    let expiryBanner = '';
    if (isPending && !isExpired && order.payment_expires_at) {
        const expiresAt  = new Date(order.payment_expires_at + 'Z'); // treat as UTC
        const remaining  = expiresAt - Date.now();
        if (remaining > 0) {
            const mins = Math.floor(remaining / 60000);
            const secs = Math.floor((remaining % 60000) / 1000);
            expiryBanner = `
                <div style="background:var(--color-warning-light,#fff3cd);
                            border:1px solid var(--color-warning,#ffc107);
                            border-radius:var(--radius-sm); padding:var(--space-2) var(--space-3);
                            font-size:var(--text-xs); color:#856404;
                            display:flex; align-items:center; gap:var(--space-2);
                            margin-bottom:var(--space-3)">
                    ⏳ Complete payment within <strong id="timer-${order.order_number}"
                    >${mins}m ${secs}s</strong> to confirm your order.
                </div>
            `;
        }
    }

    return `
        <div class="order-card">

            <!-- Header -->
            <div class="order-card-header">
                <div>
                    <div class="order-number"># ${order.order_number}</div>
                    <div class="order-date">
                        Placed on ${formatDate(order.created_at)}
                    </div>
                </div>
                <span class="status-badge status-${order.status}">
                    ${statusIcon(order.status)} ${capitalize(order.status)}
                </span>
            </div>

            <!-- Expiry Banner -->
            ${expiryBanner}

            <!-- Body -->
            <div class="order-card-body">

                <!-- Item Thumbnails -->
                <div class="order-items-preview">
                    ${thumbs.map(item => `
                        <div class="order-item-thumb">
                            <img src="${item.image_url || '/static/images/placeholder.png'}"
                                 alt="${item.product_name}"
                                 onerror="this.src='/static/images/placeholder.png'">
                        </div>
                    `).join('')}
                    ${extra > 0 ? `
                        <div class="order-more-items">+${extra}</div>
                    ` : ''}
                </div>

                <!-- Item Names -->
                <div style="font-size:var(--text-sm); color:var(--color-text-secondary)">
                    ${items.map(i =>
                        `${i.product_name} (${i.variant_label}) × ${i.quantity}`
                    ).join(' · ')}
                </div>

            </div>

            <!-- Footer -->
            <div class="order-card-footer">
                <div>
                    <div style="font-size:var(--text-xs); color:var(--color-text-muted)">
                        Order Total
                    </div>
                    <div class="price" style="font-size:var(--text-lg)">
                        ₹${parseFloat(order.total).toFixed(2)}
                    </div>
                </div>

                <div style="display:flex; gap:var(--space-2); flex-wrap:wrap">

                    <!-- Pay Now — only for pending, non-expired orders -->
                    ${isPending && !isExpired ? `
                        <button class="btn btn-accent btn-sm"
                                onclick="retryPayment('${order.order_number}')">
                            <i class="ph ph-credit-card"></i> Pay Now
                        </button>
                    ` : ''}

                    <!-- Track Order — only after payment confirmed -->
                    ${!isPending ? `
                        <a href="/orders/${order.order_number}"
                           class="btn btn-primary btn-sm">
                            <i class="ph ph-map-pin"></i> Track Order
                        </a>
                    ` : ''}

                    <!-- Cancel — pending or confirmed only -->
                    ${['pending','confirmed'].includes(order.status) ? `
                        <button class="btn btn-outline btn-sm"
                                style="color:var(--color-error); border-color:var(--color-error)"
                                onclick="cancelOrder('${order.order_number}')">
                            <i class="ph ph-x"></i> Cancel
                        </button>
                    ` : ''}

                    <!-- Reorder — delivered orders -->
                    ${order.status === 'delivered' ? `
                        <button class="btn btn-outline btn-sm"
                                onclick="reorder(${JSON.stringify(order.items).replace(/"/g,'&quot;')})">
                            <i class="ph ph-arrow-counter-clockwise"></i> Reorder
                        </button>
                    ` : ''}

                </div>
            </div>

        </div>
    `;
}


// ── Countdown Timers ───────────────────────────────────────
// Called at the end of every renderOrders() pass. Each timer only
// updates its own text node — it does NOT call renderOrders() or
// mutate allOrders, so there is no render loop. When the window
// runs out, a fresh loadOrders() hits the server for authoritative
// data (status will be 'cancelled' by then).
function startCountdownTimers() {
    allOrders.forEach(order => {
        if (order.status !== 'pending' || order.is_payment_expired) return;
        if (!order.payment_expires_at) return;

        const el        = document.getElementById(`timer-${order.order_number}`);
        if (!el) return;

        const expiresAt = new Date(order.payment_expires_at + 'Z'); // treat as UTC

        const tick = () => {
            if (!el.isConnected) return; // element removed by a later render — stop

            const remaining = expiresAt - Date.now();
            if (remaining <= 0) {
                // Reload from server so card shows the cancelled status
                loadOrders();
                return;
            }

            const mins = Math.floor(remaining / 60000);
            const secs = Math.floor((remaining % 60000) / 1000);
            el.textContent = `${mins}m ${secs}s`;
            setTimeout(tick, 1000);
        };

        setTimeout(tick, 1000);
    });
}


// ── Retry Payment ──────────────────────────────────────────
async function retryPayment(orderNumber) {
    try {
        const payRes = await API.post(`/api/payments/retry/${orderNumber}`, {});
        const { razorpay_order_id, amount, currency, key_id, payment_id } = payRes.data;

        const user = Auth.getUser();

        const options = {
            key         : key_id,
            amount,
            currency,
            name        : 'KYFF',
            description : `Order ${orderNumber}`,
            order_id    : razorpay_order_id,
            prefill     : {
                name    : user?.name  || '',
                email   : user?.email || '',
                contact : user?.phone || '',
            },
            theme : { color: '#2D6A4F' },

            handler: async (response) => {
                try {
                    await API.post('/api/payments/verify', {
                        razorpay_order_id   : response.razorpay_order_id,
                        razorpay_payment_id : response.razorpay_payment_id,
                        razorpay_signature  : response.razorpay_signature,
                        payment_id,
                    });
                    showToast('Payment successful! Order confirmed. ✅');
                    loadOrders();
                } catch (e) {
                    showToast('Payment verification failed. Contact support.', 'error');
                }
            },

            modal: {
                ondismiss: () => {
                    showToast('Payment cancelled. You can retry anytime.', 'warning');
                }
            }
        };

        const rzp = new Razorpay(options);
        rzp.open();

    } catch (err) {
        showToast(err.message || 'Could not initiate payment. Please try again.', 'error');
    }
}


// ── Cancel Order ───────────────────────────────────────────
async function cancelOrder(orderNumber) {
    if (!confirm(`Cancel order #${orderNumber}? This cannot be undone.`)) return;

    try {
        await API.post(`/api/orders/${orderNumber}/cancel`, {});
        showToast('Order cancelled successfully');
        loadOrders();
    } catch (err) {
        showToast(err.message || 'Could not cancel order', 'error');
    }
}


// ── Reorder ────────────────────────────────────────────────
async function reorder(items) {
    try {
        let added = 0;
        for (const item of items) {
            if (item.variant_id) {
                try {
                    await Cart.addItem(item.variant_id, item.quantity);
                    added++;
                } catch (e) {}
            }
        }
        if (added > 0) {
            showToast(`${added} item${added > 1 ? 's' : ''} added to cart! 🛒`);
            Cart.refreshBadge();
        } else {
            showToast('Some items are no longer available', 'warning');
        }
    } catch (err) {
        showToast('Could not reorder. Please try again.', 'error');
    }
}


// ── Pagination ─────────────────────────────────────────────
function renderPagination(totalPages) {
    const container = document.getElementById('orders-pagination');
    container.innerHTML = '';

    const prev = document.createElement('button');
    prev.className = 'pagination-btn';
    prev.innerHTML = '<i class="ph ph-caret-left"></i>';
    prev.disabled  = currentPage === 1;
    prev.onclick   = () => { currentPage--; renderOrders(); scrollToTop(); };
    container.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.className   = `pagination-btn ${i === currentPage ? 'active' : ''}`;
        btn.textContent = i;
        btn.onclick     = () => { currentPage = i; renderOrders(); scrollToTop(); };
        container.appendChild(btn);
    }

    const next = document.createElement('button');
    next.className = 'pagination-btn';
    next.innerHTML = '<i class="ph ph-caret-right"></i>';
    next.disabled  = currentPage === totalPages;
    next.onclick   = () => { currentPage++; renderOrders(); scrollToTop(); };
    container.appendChild(next);
}


// ── Helpers ────────────────────────────────────────────────
function formatDate(str) {
    if (!str) return '';
    return new Date(str).toLocaleDateString('en-IN', {
        day: 'numeric', month: 'short', year: 'numeric'
    });
}

function capitalize(str) {
    return str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
}

function statusIcon(status) {
    const icons = {
        pending    : '🕐',
        confirmed  : '✅',
        processing : '⚙️',
        shipped    : '🚚',
        delivered  : '📦',
        cancelled  : '❌',
        refunded   : '↩️',
    };
    return icons[status] || '📋';
}

function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

<!-- Razorpay SDK — needed for retry payment -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

{% endblock %}
